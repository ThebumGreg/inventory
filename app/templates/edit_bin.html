{% extends "base.html" %}

{% block content %}

<h1>Edit Bin</h1>

<form method="POST">

<label>Bin Title</Title></label><br>
<input type="text" name="bin_name" value="{{ bin.name }}">

<br><br>

<label>Bin Location</label><br>
<input type="text" name="location" value="{{ bin.location }}">

<br><br>

<label>Bin Description</label><br>
<textarea rows="4", name="description">{{ bin.description }}</textarea>

<br><br>

 <button type="submit" class="button" name="action" value="update">
    Update Bin
</button>

</form>

<form method="POST">

 <button type="submit" class="button" name="action" value="delete" onclick="return confirm('Delete this Bin?');">
    Delete Bin
</button>

</form>


{% endblock %}
