{% extends "base.html" %}

{% block content %}

<div class="form-container">

    <h1>Edit Bin</h1>

    <form method="POST" enctype="multipart/form-data">

        <div class="form-group">
            <label for="bin_name">Bin Title</label>
            <input
                type="text"
                id="bin_name"
                name="bin_name"
                value="{{ bin.bin_name }}"
                required>
        </div>

        <div class="form-group">
            <label for="location">Bin Location</label>
            <input
                type="text"
                id="location"
                name="location"
                value="{{ bin.location }}"
                required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea
                id="description"
                name="description"
                rows="4">{{ bin.description }}</textarea>
        </div>

        <div class="form-group">
            <label>Photo</label>

            {% if bin.photo_filename %}
                <img
                    src="{{ url_for('static', filename='uploads/bins/' ~ bin.photo_filename) }}"
                    alt="{{ bin.bin_name }}"
                    class="bin-photo">
            {% endif %}

            <input
                type="file"
                name="photo"
                accept="image/*">
        </div>

        <button type="submit"
                class="button"
                name="action"
                value="update">
            Update Bin
        </button>

    </form>

    <hr>

    <form method="POST">

        <button
            type="submit"
            class="button delete-button"
            name="action"
            value="delete"
            onclick="return confirm('Delete this bin?');">
            Delete Bin
        </button>

    </form>

</div>

{% endblock %}
